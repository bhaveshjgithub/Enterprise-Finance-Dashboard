server:
  port: 8080
  
spring:
  application:
    name: edufinance-backend

  # H2 In-Memory Database Configuration
  datasource:
    url: jdbc:h2:mem:edufinance_db;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driverClassName: org.h2.Driver
    username: sa
    password: 

  # Enable the H2 Web Console to view your tables
  h2:
    console:
      enabled: true
      path: /h2-console
      settings:
        web-allow-others: true

  # JPA / Hibernate Configuration for H2
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: update 
    show-sql: true 
    properties:
      hibernate:
        format_sql: true

logging:
  level:
    org.springframework.web: INFO
    com.edufinance: DEBUG